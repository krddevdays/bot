name: KrdDevBot CI/CD Pipeline

on:
  push:
    branches:
      - cicd

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: uv sync --frozen
    - name: Run tests
      run: uv run pytest tests

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: uv sync --frozen
    - name: Run linters
      run: uv run ruff check .

